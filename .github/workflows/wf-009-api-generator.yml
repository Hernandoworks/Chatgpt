name: "WF-009 — API Generator"

on:
  workflow_dispatch:
    inputs:
      api_name:
        description: API name (kebab-case, e.g. user-management)
        required: true
        type: string
      service_path:
        description: Target path under 03-services/
        required: false
        type: string
      description:
        description: API requirements
        required: true
        type: string
      issue_number:
        description: Related issue number (optional)
        required: false
        type: string

env:
  NODE_VERSION: "20"

jobs:
  generate:
    name: Generate API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Prepare paths
        id: paths
        run: |
          NAME="${{ github.event.inputs.api_name }}"
          TARGET="${{ github.event.inputs.service_path }}"
          if [ -z "$TARGET" ]; then
            TARGET="03-services/$NAME"
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          mkdir -p "$TARGET/src"

      - name: Load prompt template
        id: prompt
        run: |
          if [ -f ".ai/prompts/build-api.md" ]; then
            echo "content<<EOF" >> $GITHUB_OUTPUT
            cat ".ai/prompts/build-api.md" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Build AI payload
        id: build-payload
        run: |
          cat > /tmp/payload.json << PAYLOAD
          {
            "model": "deepseek-chat",
            "messages": [{
              "role": "user",
              "content": "${{ steps.prompt.outputs.content }}\\n\\nAPI: ${{ steps.paths.outputs.name }}\\nPath: ${{ steps.paths.outputs.target }}\\nRequirements: ${{ github.event.inputs.description }}"
            }],
            "temperature": 0.2,
            "max_tokens": 5000
          }
          PAYLOAD
          echo "payload=$(cat /tmp/payload.json | jq -c .)" >> $GITHUB_OUTPUT

      - name: Call DeepSeek API
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "$DEEPSEEK_KEY" ]; then
            curl -s -X POST https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEEPSEEK_KEY" \
              -d '${{ steps.build-payload.outputs.payload }}' \
              > /tmp/ai-response.json
            node -e '
            const fs = require("fs");
            const resp = JSON.parse(fs.readFileSync("/tmp/ai-response.json", "utf-8"));
            const content = resp.choices?.[0]?.message?.content || "";
            const target = "${{ steps.paths.outputs.target }}";
            fs.writeFileSync(target + "/src/index.ts", "// Generated by WF-009\n" + content.substring(0, 5000));
            console.log("API code written to", target);
            '
          fi

      - name: Create package.json
        run: |
          cat > "${{ steps.paths.outputs.target }}/package.json" << EOF
          {
            "name": "${{ steps.paths.outputs.name }}",
            "version": "0.1.0",
            "private": true,
            "type": "module",
            "scripts": {
              "lint": "eslint src/",
              "typecheck": "tsc --noEmit"
            },
            "dependencies": { "zod": "^3.0.0" },
            "devDependencies": {
              "@types/node": "^22.0.0",
              "typescript": "^5.8.0"
            }
          }
          EOF

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'feat/api-${{ steps.paths.outputs.name }}';
            const body = '## API: ${{ steps.paths.outputs.name }}\n\n' +
              'Generated by WF-009 API Generator\n\n' +
              '**Target:** `${{ steps.paths.outputs.target }}`\n\n---\n*Review before merging*';
            try {
              await github.rest.git.push({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `refs/heads/${branch}`, force: false
              });
            } catch (e) { console.log("Push skipped:", e.message); }
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'feat(api): add ${{ steps.paths.outputs.name }}',
              head: branch, base: 'main', body: body, draft: true
            });
            return pr.data.html_url;
