name: "WF-012 — Code Review"

on:
  pull_request:
    types: [opened, synchronize]

env:
  NODE_VERSION: "20"

jobs:
  review:
    name: AI code review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      checks: write
    if: github.actor != 'phoenix-bot' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/main...HEAD -- . ':(exclude)pnpm-lock.yaml' ':(exclude)*.json' ':(exclude)*.yml' > /tmp/pr-diff.txt
          echo "Changed files:"
          git diff --name-only origin/main...HEAD -- . ':(exclude)pnpm-lock.yaml' | head -30
          echo "size=$(wc -c < /tmp/pr-diff.txt)" >> $GITHUB_OUTPUT

      - name: Load review prompt
        id: prompt
        run: |
          if [ -f ".ai/prompts/review-code.md" ]; then
            echo "content<<EOF" >> $GITHUB_OUTPUT
            cat ".ai/prompts/review-code.md" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Call DeepSeek for review
        id: ai
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p .ai/artifacts/reviews
          DIFF=$(cat /tmp/pr-diff.txt)
          if [ -n "$DEEPSEEK_KEY" ] && [ ${#DIFF} -gt 10 ]; then
            jq -n --arg content "${{ steps.prompt.outputs.content }}" --arg diff "$DIFF" \
              '{model: "deepseek-chat", messages: [{role: "user", content: ($content + "\n\n## Code to Review\n```\n" + $diff + "\n```")}], temperature: 0.2, max_tokens: 4000}' \
              > /tmp/review-payload.json
            curl -s -X POST https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEEPSEEK_KEY" \
              -d @/tmp/review-payload.json \
              > .ai/artifacts/reviews/review-${{ github.event.number }}.json
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Post review comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewPath = `.ai/artifacts/reviews/review-${{ github.event.number }}.json`;
            if (!fs.existsSync(reviewPath)) {
              console.log('No review file found');
              return;
            }
            const review = JSON.parse(fs.readFileSync(reviewPath, 'utf-8'));
            const content = review.choices?.[0]?.message?.content || '';
            if (!content) {
              console.log('No review content');
              return;
            }
            const sections = content.split(/(?=##|\d\.\s)/);
            let summary = '## AI Code Review\n\n';
            for (const section of sections.slice(0, 3)) {
              summary += section.substring(0, 1500) + '\n\n';
            }
            summary += '\n---\n*Reviewed by WF-012*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

            const hasCritical = content.toLowerCase().includes('critical') ||
                                content.toLowerCase().includes('reject');
            if (hasCritical) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['review-changes-required']
              });
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['reviewed']
              });
            }

      - uses: actions/upload-artifact@v4
        with:
          name: code-review-pr-${{ github.event.number }}
          path: .ai/artifacts/reviews/
