name: "WF-017 — Monitoring"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

env:
  NODE_VERSION: "20"

jobs:
  monitor:
    name: Collect and publish monitoring data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect recent workflow stats
        id: workflows
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 30,
              status: 'completed'
            });
            const stats = { total: 0, success: 0, failure: 0, cancelled: 0, durations: [] };
            for (const run of runs.data.workflow_runs) {
              stats.total++;
              if (run.conclusion === 'success') stats.success++;
              else if (run.conclusion === 'failure') stats.failure++;
              else if (run.conclusion === 'cancelled') stats.cancelled++;
              if (run.run_started_at && run.updated_at) {
                const duration = (new Date(run.updated_at) - new Date(run.run_started_at)) / 1000;
                stats.durations.push(duration);
              }
            }
            const avgDuration = stats.durations.length > 0
              ? Math.round(stats.durations.reduce((a, b) => a + b, 0) / stats.durations.length)
              : 0;
            return { ...stats, avg_duration_seconds: avgDuration };

      - name: Collect test metrics
        id: tests
        run: |
          if [ -f "06-docs/project/BUILD_SUMMARY.md" ]; then
            echo "data<<EOF" >> $GITHUB_OUTPUT
            grep -E "Tests.*pass" "06-docs/project/BUILD_SUMMARY.md" | tail -5 || echo "No test data"
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Generate monitoring report
        id: report
        run: |
          TODAY=$(date +%Y-%m-%d)
          STATS='${{ steps.workflows.outputs.result }}'
          cat > /tmp/monitoring-report.md << EOF
          # Daily Monitoring Report — ${TODAY}

          ## Workflow Summary (last 30 runs)
          - Total runs: $(echo "$STATS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).total))")
          - Success: $(echo "$STATS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).success))")
          - Failures: $(echo "$STATS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).failure))")
          - Cancelled: $(echo "$STATS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).cancelled))")
          - Avg duration: $(echo "$STATS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).avg_duration_seconds + 's'))")

          ## Test Metrics
          ${{ steps.tests.outputs.data }}

          ## Repository Health
          - Open issues: $(gh issue list --state open --limit 1 --json totalCount --jq '.totalCount' 2>/dev/null || echo "N/A")
          - Open PRs: $(gh pr list --state open --limit 1 --json totalCount --jq '.totalCount' 2>/dev/null || echo "N/A")

          ---
          *Generated by WF-017 Monitoring*
          EOF

      - name: Publish monitoring report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/monitoring-report.md', 'utf-8');
            const today = new Date().toISOString().split('T')[0];
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring'
            });
            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Daily Monitoring Report — ' + today,
                body: report,
                labels: ['monitoring', 'phoenix']
              });
            }

      - uses: actions/upload-artifact@v4
        with:
          name: monitoring-report
          path: /tmp/monitoring-report.md
