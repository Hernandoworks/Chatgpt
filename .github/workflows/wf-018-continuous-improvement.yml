name: "WF-018 — Continuous Improvement"

on:
  workflow_dispatch:
    inputs:
      iteration_label:
        description: Iteration or milestone to review (e.g. Sprint 1)
        required: false
        type: string
  schedule:
    - cron: "0 8 1 * *"

env:
  NODE_VERSION: "20"

jobs:
  improve:
    name: Analyze and recommend improvements
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review completed tasks
        id: tasks
        run: |
          echo "### Completed Work Review" > /tmp/improvement-report.md
          if [ -f "06-docs/project/TASK_REGISTER.md" ]; then
            COMPLETED=$(grep -c "COMPLETED" "06-docs/project/TASK_REGISTER.md" || echo 0)
            BLOCKED=$(grep -c "BLOCKED" "06-docs/project/TASK_REGISTER.md" || echo 0)
            echo "- Completed tasks: $COMPLETED" >> /tmp/improvement-report.md
            echo "- Blocked tasks: $BLOCKED" >> /tmp/improvement-report.md
          fi
          if [ -f "06-docs/project/BUILD_SUMMARY.md" ]; then
            echo "" >> /tmp/improvement-report.md
            echo "### Build History" >> /tmp/improvement-report.md
            grep -E "^## " "06-docs/project/BUILD_SUMMARY.md" | head -10 >> /tmp/improvement-report.md
          fi
          echo "" >> /tmp/improvement-report.md

      - name: Analyze workflow failure patterns
        id: failures
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
              status: 'completed',
              conclusion: 'failure'
            });
            const failed = {};
            for (const run of runs.data.workflow_runs) {
              const name = run.name || 'unknown';
              failed[name] = (failed[name] || 0) + 1;
            }
            return failed;

      - name: Identify long-running tasks
        id: long-tasks
        run: |
          echo "### Potential Bottlenecks" >> /tmp/improvement-report.md
          FAILURES='${{ steps.failures.outputs.result }}'
          echo "$FAILURES" | node -e '
          let data = "";
          process.stdin.on("data", c => data += c);
          process.stdin.on("end", () => {
            try {
              const failures = JSON.parse(data);
              for (const [workflow, count] of Object.entries(failures)) {
                if (count > 2) {
                  console.log(`- ${workflow} failed ${count} times — investigate`);
                }
              }
            } catch (e) { console.log("- No failure data available"); }
          });
          ' >> /tmp/improvement-report.md

      - name: Generate improvement recommendations
        id: recommendations
        run: |
          echo "" >> /tmp/improvement-report.md
          echo "## Recommendations" >> /tmp/improvement-report.md
          echo "" >> /tmp/improvement-report.md

          if [ -f "06-docs/project/TASK_REGISTER.md" ]; then
            OVER_ESTIMATE=$(grep -c "Actual effort.*>" "06-docs/project/TASK_REGISTER.md" || echo 0)
            if [ "$OVER_ESTIMATE" -gt 0 ]; then
              echo "- [ ] Review effort estimates: $OVER_ESTIMATE tasks exceeded estimates" >> /tmp/improvement-report.md
            fi
          fi

          echo "- [ ] Review and update ROADMAP.md with current priorities" >> /tmp/improvement-report.md
          echo "- [ ] Run WF-014 Repository Health for detailed code quality report" >> /tmp/improvement-report.md
          echo "- [ ] Check for documentation gaps in newly added features" >> /tmp/improvement-report.md
          echo "- [ ] Verify all tests are passing and covering new code" >> /tmp/improvement-report.md
          echo "" >> /tmp/improvement-report.md
          echo "---" >> /tmp/improvement-report.md
          echo "*Generated by WF-018 Continuous Improvement*" >> /tmp/improvement-report.md

      - name: Create improvement issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/improvement-report.md', 'utf-8');
            const label = '${{ github.event.inputs.iteration_label }}' || 'Monthly Review';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Continuous Improvement — ${label} (${new Date().toISOString().split('T')[0]})`,
              body: report,
              labels: ['improvement', 'phoenix']
            });

      - uses: actions/upload-artifact@v4
        with:
          name: continuous-improvement-report
          path: /tmp/improvement-report.md
