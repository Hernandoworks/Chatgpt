name: "WF-004 — AI Planning"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to plan for
        required: true
        type: string
      prompt_id:
        description: Prompt template ID from .ai/prompts/
        required: false
        default: triage-request
        type: string

env:
  NODE_VERSION: "20"

jobs:
  plan:
    name: Generate AI planning report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Fetch issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ github.event.inputs.issue_number }}')
            });
            const labels = issue.data.labels.map(l => l.name).join(', ');
            const body = (issue.data.body || '').substring(0, 3000);
            const title = issue.data.title;
            return { title, body, labels };

      - name: Load architecture and standards
        id: context
        run: |
          echo "architecture<<EOF" >> $GITHUB_OUTPUT
          cat .opencode/ARCHITECTURE.md 2>/dev/null || echo "No architecture file" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "standards<<EOF" >> $GITHUB_OUTPUT
          cat .opencode/STANDARDS.md 2>/dev/null || echo "No standards file" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "stack<<EOF" >> $GITHUB_OUTPUT
          cat .opencode/STACK.md 2>/dev/null || echo "No stack file" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load prompt template
        id: prompt
        run: |
          PROMPT_FILE=".ai/prompts/${{ github.event.inputs.prompt_id }}.md"
          if [ -f "$PROMPT_FILE" ]; then
            echo "template<<EOF" >> $GITHUB_OUTPUT
            cat "$PROMPT_FILE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "template=Error: Prompt template $PROMPT_FILE not found" >> $GITHUB_OUTPUT
          fi

      - name: Build AI request payload
        id: build-payload
        run: |
          cat > /tmp/payload.json << PAYLOAD
          {
            "model": "deepseek-chat",
            "messages": [
              {
                "role": "system",
                "content": "You are the Agent Orchestrator at Phoenix AI Software Factory."
              },
              {
                "role": "user",
                "content": "## Issue Title\\n${{ fromJson(steps.issue.outputs.result).title }}\\n\\n## Issue Body\\n${{ fromJson(steps.issue.outputs.result).body }}\\n\\n## Labels\\n${{ fromJson(steps.issue.outputs.result).labels }}\\n\\n## Architecture\\n${{ steps.context.outputs.architecture }}\\n\\n## Standards\\n${{ steps.context.outputs.standards }}\\n\\n## Stack\\n${{ steps.context.outputs.stack }}\\n\\n## Prompt Template\\n${{ steps.prompt.outputs.template }}"
              }
            ],
            "temperature": 0.3,
            "max_tokens": 4000
          }
          PAYLOAD
          echo "payload=$(cat /tmp/payload.json | jq -c .)" >> $GITHUB_OUTPUT

      - name: Call DeepSeek API
        id: ai
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p .ai/artifacts/planning
          if [ -n "$DEEPSEEK_KEY" ]; then
            curl -s -X POST https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEEPSEEK_KEY" \
              -d '${{ steps.build-payload.outputs.payload }}' \
              > .ai/artifacts/planning/report-${{ github.event.inputs.issue_number }}.json
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo '{"error":"DEEPSEEK_API_KEY not set"}' > .ai/artifacts/planning/report-${{ github.event.inputs.issue_number }}.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: planning-report-issue-${{ github.event.inputs.issue_number }}
          path: .ai/artifacts/planning/

      - name: Post planning report to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = `.ai/artifacts/planning/report-${{ github.event.inputs.issue_number }}.json`;
            let comment = '## AI Planning Report\n\nGenerated by WF-004\n\n';
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));
              if (report.choices && report.choices[0]) {
                comment += report.choices[0].message.content.substring(0, 3000);
              } else if (report.error) {
                comment += '⚠️ Planning skipped: ' + report.error;
              }
            }
            comment += '\n\n---\n*Generated by WF-004 AI Planning*';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ github.event.inputs.issue_number }}'),
              body: comment
            });
