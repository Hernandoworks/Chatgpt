name: "WF-014 — Repository Health"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  NODE_VERSION: "20"

jobs:
  health:
    name: Evaluate repository health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for large files
        id: large-files
        run: |
          echo "### Large Files (>300 lines)" > /tmp/health-report.md
          find . -name '*.ts' -o -name '*.tsx' | while read f; do
            lines=$(wc -l < "$f" 2>/dev/null || echo 0)
            if [ "$lines" -gt 300 ]; then
              echo "- $f ($lines lines)" >> /tmp/health-report.md
            fi
          done
          echo "" >> /tmp/health-report.md

      - name: Check for documentation gaps
        id: doc-gaps
        run: |
          echo "### Documentation Gaps" >> /tmp/health-report.md
          for dir in 01-apps/* 02-packages/* 03-services/*; do
            if [ -d "$dir" ] && [ ! -f "$dir/README.md" ]; then
              echo "- $dir (missing README.md)" >> /tmp/health-report.md
            fi
          done
          echo "" >> /tmp/health-report.md

      - name: Check for duplicate code
        id: duplicates
        run: |
          echo "### Potential Duplicates" >> /tmp/health-report.md
          find . -name '*.ts' -o -name '*.tsx' | head -100 | while read f; do
            BASENAME=$(basename "$f")
            COUNT=$(find . -name "$BASENAME" 2>/dev/null | wc -l)
            if [ "$COUNT" -gt 1 ]; then
              echo "- $BASENAME appears $COUNT times" >> /tmp/health-report.md
            fi
          done | sort -u | head -10
          echo "" >> /tmp/health-report.md

      - name: Check unused dependencies
        id: deps
        run: |
          echo "### Unused Dependencies (scanning)" >> /tmp/health-report.md
          for pkg_file in $(find . -name 'package.json' -not -path './node_modules/*' -not -path './.next/*'); do
            node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("'"$pkg_file"'", "utf-8"));
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            for (const [name] of Object.entries(deps)) {
              const found = require("child_process").execSync(
                "grep -r \"" + name + "\" $(dirname \"'"$pkg_file"'\")/src --include=\"*.ts\" --include=\"*.tsx\" 2>/dev/null | wc -l",
                { encoding: "utf-8" }
              ).trim();
              if (parseInt(found) === 0 && !name.startsWith("@types/")) {
                console.log("- " + name + " in " + "'"$pkg_file"'");
              }
            }
            ' 2>/dev/null || true
          done >> /tmp/health-report.md 2>/dev/null

      - name: Calculate health score
        id: score
        run: |
          ISSUES=$(wc -l < /tmp/health-report.md)
          SCORE=100
          ISSUES=$((ISSUES - 3))  # Subtract header lines
          [ "$ISSUES" -gt 10 ] && SCORE=80
          [ "$ISSUES" -gt 20 ] && SCORE=60
          [ "$ISSUES" -gt 30 ] && SCORE=40
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          echo "" >> /tmp/health-report.md
          echo "## Health Score: $SCORE/100" >> /tmp/health-report.md
          echo "Issues found: $ISSUES" >> /tmp/health-report.md
          echo "" >> /tmp/health-report.md
          echo "---" >> /tmp/health-report.md
          echo "*Generated by WF-014 Repository Health*" >> /tmp/health-report.md

      - name: Post health report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/health-report.md', 'utf-8');
            const score = '${{ steps.score.outputs.score }}';
            const today = new Date().toISOString().split('T')[0];
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'repository-health'
            });
            const body = '# Repository Health Report\n\n**Date:** ' + today +
              '\n**Score:** ' + score + '/100\n\n' + report;
            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Repository Health Report — ' + today,
                body: body,
                labels: ['repository-health', 'phoenix']
              });
            }

      - uses: actions/upload-artifact@v4
        with:
          name: repository-health-report
          path: /tmp/health-report.md
