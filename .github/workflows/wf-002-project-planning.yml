name: "WF-002 — Project Planning"

on:
  workflow_dispatch:
    inputs:
      sprint_name:
        description: Sprint name (e.g. Sprint 1)
        required: false
        type: string
      sprint_duration_days:
        description: Sprint duration in days
        required: false
        default: "14"
        type: string
  schedule:
    - cron: "0 9 * * 1"

env:
  NODE_VERSION: "20"

jobs:
  plan:
    name: Generate sprint plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set sprint name
        id: sprint
        run: |
          if [ -n "${{ github.event.inputs.sprint_name }}" ]; then
            echo "name=${{ github.event.inputs.sprint_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=Sprint $(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          echo "end=$(date -d '+${{ github.event.inputs.sprint_duration_days || '14' }} days' +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Read backlog and roadmap
        id: backlog
        run: |
          if [ -f "06-docs/project/TASK_REGISTER.md" ]; then
            echo "register<<EOF" >> $GITHUB_OUTPUT
            cat "06-docs/project/TASK_REGISTER.md" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "register=No task register found" >> $GITHUB_OUTPUT
          fi
          if [ -f ".opencode/ROADMAP.md" ]; then
            echo "roadmap<<EOF" >> $GITHUB_OUTPUT
            cat ".opencode/ROADMAP.md" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "roadmap=No roadmap found" >> $GITHUB_OUTPUT
          fi

      - name: Build prompt with context
        id: build-prompt
        run: |
          cat > /tmp/prompt.md << 'PROMPT'
          You are a Project Manager at Phoenix AI Software Factory. Analyze the backlog and roadmap,
          then generate a sprint plan. For each READY task, assign a priority (P0/P1/P2) and
          effort estimate (S/M/L/XL). Identify any dependency chains that must be completed in order.
          Return a structured plan with: sprint goal, task assignments, dependencies, and risks.
          PROMPT
          echo "Backlog: ${{ steps.backlog.outputs.register }}" >> /tmp/context.md
          echo "Roadmap: ${{ steps.backlog.outputs.roadmap }}" >> /tmp/context.md
          echo "prompt=$(cat /tmp/prompt.md /tmp/context.md | jq -Rs .)" >> $GITHUB_OUTPUT

      - name: Call DeepSeek API
        id: ai
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "$DEEPSEEK_KEY" ]; then
            curl -s -X POST https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEEPSEEK_KEY" \
              -d "{
                \"model\": \"deepseek-chat\",
                \"messages\": [{\"role\": \"user\", \"content\": ${{ steps.build-prompt.outputs.prompt }}}],
                \"temperature\": 0.3
              }" > /tmp/sprint-plan.json
            echo "plan=$(cat /tmp/sprint-plan.json)" >> $GITHUB_OUTPUT
          else
            echo "plan={\"error\":\"DEEPSEEK_API_KEY not set\"}" >> $GITHUB_OUTPUT
          fi

      - name: Create sprint plan artifact
        run: |
          mkdir -p .ai/artifacts/planning
          cat > .ai/artifacts/planning/sprint-plan.md << 'PLAN'
          # Sprint Plan

          Generated by WF-002 Project Planning
          Date: $(date +%Y-%m-%d)

          ## Sprint Goal

          (AI-generated sprint goal will appear here)

          ## Tasks

          (AI-generated task assignments will appear here)
          PLAN
          echo "Plan saved to .ai/artifacts/planning/sprint-plan.md"

      - uses: actions/upload-artifact@v4
        with:
          name: sprint-plan
          path: .ai/artifacts/planning/

      - name: Post planning summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = '.ai/artifacts/planning/sprint-plan.md';
            let summary = '## Sprint Planning Complete\n\n';
            if (fs.existsSync(planPath)) {
              summary += fs.readFileSync(planPath, 'utf-8').substring(0, 2000);
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Sprint Planning: ${{ steps.sprint.outputs.name }}',
              body: summary + '\n\n---\n*Generated by WF-002*',
              labels: ['phoenix']
            });
