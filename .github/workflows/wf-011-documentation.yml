name: "WF-011 — Documentation"

on:
  workflow_dispatch:
    inputs:
      doc_type:
        description: Type of documentation to generate
        required: true
        type: choice
        options:
          - readme
          - api-docs
          - architecture
          - changelog
          - build-summary
          - full
      scope:
        description: Scope of files or features to document
        required: false
        type: string
      issue_number:
        description: Related issue number (optional)
        required: false
        type: string

env:
  NODE_VERSION: "20"

jobs:
  generate:
    name: Generate documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Load prompt template
        id: prompt
        run: |
          if [ -f ".ai/prompts/generate-documentation.md" ]; then
            echo "content<<EOF" >> $GITHUB_OUTPUT
            cat ".ai/prompts/generate-documentation.md" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Collect scope context
        id: context
        run: |
          SCOPE="${{ github.event.inputs.scope }}"
          if [ -z "$SCOPE" ]; then
            echo "info=Full repository documentation review" >> $GITHUB_OUTPUT
            echo "files=$(find . -name '*.md' -not -path './node_modules/*' -not -path './.git/*' -not -path './.next/*' | head -30)" >> $GITHUB_OUTPUT
          else
            echo "info=$SCOPE" >> $GITHUB_OUTPUT
          fi

      - name: Call DeepSeek for documentation
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p .ai/artifacts/docs
          if [ -n "$DEEPSEEK_KEY" ]; then
            curl -s -X POST https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEEPSEEK_KEY" \
              -d "{
                \"model\": \"deepseek-chat\",
                \"messages\": [{
                  \"role\": \"user\",
                  \"content\": \"${{ steps.prompt.outputs.content }}\\n\\nType: ${{ github.event.inputs.doc_type }}\\nScope: ${{ steps.context.outputs.info }}\"
                }],
                \"temperature\": 0.3,
                \"max_tokens\": 4000
              }" > .ai/artifacts/docs/response.json
          fi

      - name: Update specific doc files based on type
        run: |
          TYPE="${{ github.event.inputs.doc_type }}"
          case "$TYPE" in
            readme)
              echo "Marking README.md for update"
              touch .ai/artifacts/docs/needs-update-readme
              ;;
            changelog)
              echo "Marking CHANGELOG.md for update"
              touch .ai/artifacts/docs/needs-update-changelog
              ;;
            architecture)
              echo "Marking ARCHITECTURE.md for update"
              touch .ai/artifacts/docs/needs-update-architecture
              ;;
            build-summary)
              echo "Marking BUILD_SUMMARY.md for update"
              touch .ai/artifacts/docs/needs-update-build-summary
              ;;
            full)
              touch .ai/artifacts/docs/needs-update-all
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: documentation-${{ github.event.inputs.doc_type }}
          path: .ai/artifacts/docs/

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'docs/${{ github.event.inputs.doc_type }}-update';
            const body = '## Documentation Update\n\n' +
              '**Type:** ${{ github.event.inputs.doc_type }}\n' +
              '**Scope:** ${{ github.event.inputs.scope || 'Repository-wide' }}\n\n' +
              'Generated by WF-011\n\n---\n*Review before merging*';
            try {
              await github.rest.git.push({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `refs/heads/${branch}`, force: false
              });
            } catch (e) { console.log("Push skipped:", e.message); }
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'docs: ${{ github.event.inputs.doc_type }} update',
              head: branch, base: 'main', body: body, draft: true
            });
            return pr.data.html_url;
