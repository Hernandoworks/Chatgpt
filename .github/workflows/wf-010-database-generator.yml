name: "WF-010 — Database Generator"

on:
  workflow_dispatch:
    inputs:
      migration_name:
        description: Migration name (e.g. create-users-table)
        required: true
        type: string
      description:
        description: Schema change requirements
        required: true
        type: string
      issue_number:
        description: Related issue number (optional)
        required: false
        type: string

env:
  NODE_VERSION: "20"

jobs:
  generate:
    name: Generate database migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare paths
        id: paths
        run: |
          NAME="${{ github.event.inputs.migration_name }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          mkdir -p "04-database/migrations"

      - name: Load prompt templates
        id: prompts
        run: |
          echo "schema<<EOF" >> $GITHUB_OUTPUT
          cat .ai/prompts/write-schema.md 2>/dev/null || echo "No schema prompt"
          echo "EOF" >> $GITHUB_OUTPUT
          echo "migration<<EOF" >> $GITHUB_OUTPUT
          cat .ai/prompts/create-migration.md 2>/dev/null || echo "No migration prompt"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call DeepSeek API
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "$DEEPSEEK_KEY" ]; then
            curl -s -X POST https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEEPSEEK_KEY" \
              -d "{
                \"model\": \"deepseek-chat\",
                \"messages\": [{
                  \"role\": \"user\",
                  \"content\": \"${{ steps.prompts.outputs.schema }}\\n\\n${{ steps.prompts.outputs.migration }}\\n\\nMigration: ${{ steps.paths.outputs.name }}\\nRequirements: ${{ github.event.inputs.description }}\"
                }],
                \"temperature\": 0.2,
                \"max_tokens\": 4000
              }" > /tmp/ai-response.json
            node -e '
            const fs = require("fs");
            const resp = JSON.parse(fs.readFileSync("/tmp/ai-response.json", "utf-8"));
            const content = resp.choices?.[0]?.message?.content || "";
            const ts = "${{ steps.paths.outputs.timestamp }}";
            const name = "${{ steps.paths.outputs.name }}";
            const outDir = "04-database/migrations";
            const upPath = `${outDir}/${ts}_${name}_up.sql`;
            const downPath = `${outDir}/${ts}_${name}_down.sql`;
            const seedPath = `${outDir}/${ts}_${name}_seed.sql`;

            fs.writeFileSync(upPath, "-- Up Migration\n-- Generated by WF-010\n\n" + content);
            fs.writeFileSync(downPath, "-- Down Migration\n-- Generated by WF-010\n\n-- TODO: Write rollback SQL");
            fs.writeFileSync(seedPath, "-- Seed Data\n-- Generated by WF-010\n\n-- TODO: Write seed SQL");
            console.log("Created migrations in", outDir);
            '
          fi

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'feat/db-${{ steps.paths.outputs.name }}';
            const body = '## Database Migration: ${{ steps.paths.outputs.name }}\n\nGenerated by WF-010\n\n---\n*Review before merging*';
            try {
              await github.rest.git.push({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `refs/heads/${branch}`, force: false
              });
            } catch (e) { console.log("Push skipped:", e.message); }
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'feat(db): add ${{ steps.paths.outputs.name }} migration',
              head: branch, base: 'main', body: body, draft: true
            });
            return pr.data.html_url;
