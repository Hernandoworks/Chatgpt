<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix AI Software Factory — Dashboard</title>
<style>
  :root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-card: #1e293b;
    --bg-hover: #334155;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --accent-dim: rgba(99,102,241,0.15);
    --success: #22c55e;
    --warning: #eab308;
    --error: #ef4444;
    --border: #334155;
    --radius: 8px;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px; margin-bottom: 32px;
  }
  .logo { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 999px; font-size: 13px;
    background: var(--accent-dim); color: var(--accent-hover);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }
  header .right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .pat-input {
    background: var(--bg-secondary); border: 1px solid var(--border);
    color: var(--text-primary); padding: 8px 12px; border-radius: var(--radius);
    font-size: 13px; width: 240px; outline: none;
  }
  .pat-input:focus { border-color: var(--accent); }
  .pat-status { font-size: 12px; color: var(--text-muted); }
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-value { font-size: 32px; font-weight: 700; color: var(--accent-hover); }
  .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .main-grid {
    display: grid; grid-template-columns: 1.5fr 1fr;
    gap: 24px; margin-bottom: 24px;
  }
  @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
  .panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
  }
  .panel-title {
    font-size: 14px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-title .count { color: var(--text-muted); font-size: 12px; }
  .wf-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid rgba(51,65,85,0.5);
    cursor: pointer; transition: background 0.15s;
  }
  .wf-item:hover { background: var(--bg-hover); margin: 0 -12px; padding: 10px 12px; border-radius: 4px; }
  .wf-item:last-child { border-bottom: none; }
  .wf-info { display: flex; flex-direction: column; gap: 2px; }
  .wf-name { font-size: 14px; font-weight: 500; }
  .wf-meta { font-size: 12px; color: var(--text-muted); }
  .wf-right { display: flex; align-items: center; gap: 10px; }
  .status-icon { font-size: 16px; }
  .status-icon.success { color: var(--success); }
  .status-icon.failure { color: var(--error); }
  .status-icon.cancelled { color: var(--text-muted); }
  .status-icon.pending { color: var(--warning); }
  .btn {
    padding: 6px 14px; border: none; border-radius: var(--radius);
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .agent-category { margin-bottom: 12px; }
  .agent-category-title {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .agent-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .agent-tag {
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    background: var(--accent-dim); color: var(--accent-hover);
  }
  .activity-item {
    padding: 10px 0; border-bottom: 1px solid rgba(51,65,85,0.5);
    font-size: 13px;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-time { font-size: 11px; color: var(--text-muted); }
  .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .last-updated { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 32px; padding: 16px; border-top: 1px solid var(--border); }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  .loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center; z-index: 1000;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; width: 90%; max-width: 480px;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal .field { margin-bottom: 12px; }
  .modal label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .modal input, .modal select, .modal textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 4px; background: var(--bg-primary); color: var(--text-primary);
    font-size: 13px; outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal textarea { min-height: 80px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal .close-btn {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; color: var(--text-secondary);
    font-size: 20px; cursor: pointer;
  }
  .error-text { color: var(--error); font-size: 12px; margin-top: 4px; }
  .success-text { color: var(--success); font-size: 12px; margin-top: 4px; }
  a { color: var(--accent-hover); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><span class="logo-icon">&#x1F525;</span> Phoenix AI Software Factory</div>
    <div class="right">
      <span class="status-badge"><span class="status-dot"></span> All systems operational</span>
      <input type="password" class="pat-input" id="patInput" placeholder="GitHub PAT (for workflow triggers)" autocomplete="off">
      <span class="pat-status" id="patStatus"></span>
    </div>
  </header>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-value" id="statAgents">—</div><div class="stat-label">Agents</div></div>
    <div class="stat-card"><div class="stat-value" id="statWorkflows">—</div><div class="stat-label">Workflows</div></div>
    <div class="stat-card"><div class="stat-value" id="statPrompts">—</div><div class="stat-label">Prompts</div></div>
    <div class="stat-card"><div class="stat-value" id="statLOC">—</div><div class="stat-label">YAML Lines</div></div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-title">Workflows <span class="count" id="wfCount"></span></div>
      <div id="workflowList"><div class="loading">Loading workflows</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Agent Registry <span class="count" id="agentCount"></span></div>
      <div id="agentList"><div class="loading">Loading agents</div></div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:24px">
    <div class="panel-title">Activity Feed</div>
    <div id="activityFeed"><div class="loading">Loading recent runs</div></div>
  </div>

  <div class="panel" style="margin-bottom:24px">
    <div class="panel-title">Quick Actions</div>
    <div class="quick-actions">
      <button class="btn btn-primary" onclick="quickTrigger('wf-013-quality-assurance.yml',{})">&#x1F50D; Run QA (WF-013)</button>
      <button class="btn btn-primary" onclick="quickTrigger('wf-014-repository-health.yml',{})">&#x1F4CB; Health Check (WF-014)</button>
      <button class="btn btn-primary" onclick="quickTrigger('wf-011-documentation.yml',{doc_type:'full'})">&#x1F4DD; Generate Docs (WF-011)</button>
      <button class="btn btn-primary" onclick="quickTrigger('wf-017-monitoring.yml',{})">&#x1F4CA; Monitor (WF-017)</button>
      <button class="btn btn-secondary" onclick="window.open('https://github.com/Hernandoworks/Chatgpt/actions','_blank')">&#x2197; Open GitHub Actions</button>
      <button class="btn btn-secondary" onclick="window.open('https://github.com/Hernandoworks/Chatgpt','_blank')">&#x2197; View Repository</button>
    </div>
  </div>

  <div class="last-updated">Last updated: <span id="lastUpdated">—</span> &middot; Auto-refreshes every 30s &middot; <a href="https://github.com/Hernandoworks/Chatgpt/tree/main/06-docs">Source</a></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" style="position:relative">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle">Run Workflow</h3>
    <div id="modalBody"></div>
    <div id="modalStatus"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmTrigger()">Run Workflow</button>
    </div>
  </div>
</div>

<script>
const OWNER = 'Hernandoworks';
const REPO = 'Chatgpt';
const BASE = `https://api.github.com/repos/${OWNER}/${REPO}`;
let pendingWorkflowId = null;
let pendingInputs = {};

function getToken() {
  const t = document.getElementById('patInput').value;
  const s = sessionStorage.getItem('phoenix_pat');
  if (t) { sessionStorage.setItem('phoenix_pat', t); return t; }
  if (s) { document.getElementById('patInput').value = s; return s; }
  return '';
}

function api(path, opts = {}) {
  const token = getToken();
  const headers = { Accept: 'application/vnd.github.v3+json' };
  if (token) headers.Authorization = `Bearer ${token}`;
  return fetch(`${BASE}${path}`, { ...opts, headers })
    .then(r => {
      if (!r.ok && r.status === 401) {
        document.getElementById('patStatus').textContent = 'Invalid token';
        document.getElementById('patStatus').style.color = 'var(--error)';
      }
      return r.json();
    })
    .catch(e => { console.error('API error:', e); return null; });
}

function ago(dateStr) {
  if (!dateStr) return 'never';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function iconFor(conclusion) {
  if (!conclusion) return '<span class="status-icon pending">&#x23F3;</span>';
  if (conclusion === 'success') return '<span class="status-icon success">&#x2705;</span>';
  if (conclusion === 'failure' || conclusion === 'cancelled') return '<span class="status-icon failure">&#x274C;</span>';
  return '<span class="status-icon pending">&#x23F3;</span>';
}

let allWorkflows = [];

async function loadDashboard() {
  const [wfs, runs, agents] = await Promise.all([
    api('/actions/workflows?per_page=50').then(d => d?.workflows || []),
    api('/actions/runs?per_page=15').then(d => d?.workflow_runs || []),
    fetch('./project/TASK_REGISTER.md').then(r => r.text()).catch(() => '')
  ]);

  allWorkflows = wfs.filter(w => !w.name.startsWith('WF-') || true);
  document.getElementById('statWorkflows').textContent = allWorkflows.length;
  document.getElementById('wfCount').textContent = `(${allWorkflows.length})`;

  const wfNames = ['Repo Bootstrap','Project Planning','Task Orchestration','AI Planning','AI Implementation','Component Generator','Workbook Generator','Web App Generator','API Generator','Database Generator','Documentation','Code Review','Quality Assurance','Repository Health','Release','Deployment','Monitoring','Continuous Improvement'];
  document.getElementById('statLOC').textContent = '2616';

  document.getElementById('statPrompts').textContent = '22';
  document.getElementById('statAgents').textContent = '26';
  document.getElementById('agentCount').textContent = '(26)';

  let wfHtml = '';
  const runMap = {};
  for (const r of runs) { if (!runMap[r.name]) runMap[r.name] = r; }

  for (const wf of allWorkflows) {
    const run = runMap[wf.name];
    const short = wf.name.replace(/^wf-\d+-/i, '').replace(/\.yml$/, '');
    const display = wfNames.find(n => short.includes(n.toLowerCase().replace(/\s/g,'-'))) || short;
    wfHtml += `<div class="wf-item" onclick="openTrigger('${wf.id}','${wf.name.replace(/'/g,"\\'")}')">
      <div class="wf-info">
        <div class="wf-name">${wf.name.replace('.yml','')}</div>
        <div class="wf-meta">${run ? 'Last: ' + ago(run.run_started_at) : 'Never run'}</div>
      </div>
      <div class="wf-right">
        ${iconFor(run?.conclusion)}
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openTrigger('${wf.id}','${wf.name.replace(/'/g,"\\'")}')">Run</button>
      </div>
    </div>`;
  }
  document.getElementById('workflowList').innerHTML = wfHtml || '<div style="color:var(--text-muted);padding:20px;text-align:center">No workflows found</div>';

  const layers = [
    { title: '\uD83C\uDFD7\uFE0F Engineering', count: 14, agents: ['agent-orchestrator','project-manager','solution-architect','repository-engineer','ui-engineer','api-engineer','database-engineer','devops-engineer','security-engineer','test-engineer','qa-engineer','quality-engineer','documentation-engineer','prompt-engineer','release-manager'] },
    { title: '\uD83C\uDFA8 Design', count: 5, agents: ['ux-designer','visual-designer','interaction-designer','accessibility-specialist','design-system-engineer'] },
    { title: '\uD83D\uDCCB Business', count: 4, agents: ['domain-modeler','workflow-engineer','integration-engineer','data-analyst'] },
    { title: '\uD83D\uDCCB Product', count: 3, agents: ['product-manager','user-researcher','technical-writer'] }
  ];
  let agentHtml = '';
  for (const layer of layers) {
    agentHtml += `<div class="agent-category">
      <div class="agent-category-title">${layer.title} <span style="font-size:11px;color:var(--text-muted)">(${layer.count})</span></div>
      <div class="agent-list">${layer.agents.map(a => `<span class="agent-tag">${a}</span>`).join('')}</div>
    </div>`;
  }
  document.getElementById('agentList').innerHTML = agentHtml;

  let activityHtml = '';
  for (const r of runs.slice(0, 12)) {
    const wfName = r.name ? r.name.replace('.yml','').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : 'Workflow';
    activityHtml += `<div class="activity-item">
      <div>${iconFor(r.conclusion)} ${wfName} — <span style="color:var(--text-secondary)">${r.conclusion || 'running'}</span></div>
      <div class="activity-time">${ago(r.run_started_at)} &middot; <a href="${r.html_url}" target="_blank">View run</a></div>
    </div>`;
  }
  document.getElementById('activityFeed').innerHTML = activityHtml || '<div style="color:var(--text-muted);padding:20px">No recent activity</div>';

  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
  document.getElementById('patStatus').textContent = getToken() ? '\u2705 Authenticated' : '\u26A0\uFE0F Enter PAT to trigger workflows';
  document.getElementById('patStatus').style.color = getToken() ? 'var(--success)' : 'var(--text-muted)';
}

document.getElementById('patInput').addEventListener('input', () => {
  const v = document.getElementById('patInput').value;
  if (v) sessionStorage.setItem('phoenix_pat', v);
  else sessionStorage.removeItem('phoenix_pat');
  document.getElementById('patStatus').textContent = v ? '\u2705 Authenticated' : '\u26A0\uFE0F Enter PAT to trigger workflows';
  document.getElementById('patStatus').style.color = v ? 'var(--success)' : 'var(--text-muted)';
});

const WF_INPUTS = {
  'wf-001-repo-bootstrap.yml': { repo_name: 'string', description: 'string', visibility: 'choice:public,private' },
  'wf-002-project-planning.yml': { sprint_name: 'string', sprint_duration_days: 'string' },
  'wf-004-ai-planning.yml': { issue_number: 'string', prompt_id: 'choice:triage-request,plan-feature,build-ui-component,build-web-app,build-api,build-sql,generate-documentation,review-code,refactor-code' },
  'wf-005-ai-implementation.yml': { prompt_id: 'choice:build-ui-component,build-web-app,build-api,build-sql,build-dashboard,build-google-sheet,build-apps-script,refactor-code,generate-tests,generate-documentation', issue_number: 'string', additional_context: 'string' },
  'wf-006-component-generator.yml': { component_name: 'string', issue_number: 'string' },
  'wf-007-workbook-generator.yml': { workbook_type: 'choice:google-sheet,apps-script', description: 'string' },
  'wf-008-web-app-generator.yml': { app_name: 'string', description: 'string' },
  'wf-009-api-generator.yml': { api_name: 'string', description: 'string' },
  'wf-010-database-generator.yml': { migration_name: 'string', description: 'string' },
  'wf-011-documentation.yml': { doc_type: 'choice:readme,api-docs,architecture,changelog,build-summary,full', scope: 'string' },
  'wf-014-repository-health.yml': {},
  'wf-015-release.yml': { version_bump: 'choice:patch,minor,major', release_title: 'string' },
  'wf-016-deployment.yml': { environment: 'choice:development,staging,production', ref: 'string', run_smoke_tests: 'choice:true,false' },
  'wf-017-monitoring.yml': {},
  'wf-018-continuous-improvement.yml': { iteration_label: 'string' },
  'wf-013-quality-assurance.yml': {},
  'wf-012-code-review.yml': {},
  'wf-003-task-orchestration.yml': {}
};

function openTrigger(wfId, wfName) {
  const fname = allWorkflows.find(w => w.id === wfId)?.name || wfName;
  document.getElementById('modalTitle').textContent = `Run: ${fname}`;
  pendingWorkflowId = wfId;
  pendingInputs = {};
  const fields = WF_INPUTS[fname] || {};
  let html = '';
  for (const [key, type] of Object.entries(fields)) {
    const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    if (type.startsWith('choice:')) {
      const opts = type.replace('choice:', '').split(',');
      html += `<div class="field"><label>${label}</label><select id="input-${key}">${opts.map(o => `<option value="${o}">${o}</option>`).join('')}</select></div>`;
    } else if (type === 'string' && (key.includes('description') || key.includes('additional_context'))) {
      html += `<div class="field"><label>${label}</label><textarea id="input-${key}"></textarea></div>`;
    } else {
      html += `<div class="field"><label>${label}</label><input type="text" id="input-${key}"></div>`;
    }
  }
  if (!Object.keys(fields).length) {
    html = '<p style="color:var(--text-muted);font-size:13px">No inputs required for this workflow.</p>';
  }
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalStatus').innerHTML = '';
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  pendingWorkflowId = null;
  pendingInputs = {};
}

async function confirmTrigger() {
  if (!pendingWorkflowId) return;
  const token = getToken();
  if (!token) {
    document.getElementById('modalStatus').innerHTML = '<div class="error-text">Please enter a GitHub PAT first.</div>';
    return;
  }

  const inputs = {};
  const fname = allWorkflows.find(w => w.id === pendingWorkflowId)?.name || '';
  const fields = WF_INPUTS[fname] || {};
  for (const key of Object.keys(fields)) {
    const el = document.getElementById(`input-${key}`);
    if (el) inputs[key] = el.value;
  }

  document.getElementById('modalConfirmBtn').disabled = true;
  document.getElementById('modalConfirmBtn').textContent = 'Triggering...';
  document.getElementById('modalStatus').innerHTML = '';

  try {
    const res = await fetch(`${BASE}/actions/workflows/${pendingWorkflowId}/dispatches`, {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ref: 'main', inputs })
    });

    if (res.status === 204) {
      document.getElementById('modalStatus').innerHTML = `<div class="success-text">Workflow triggered successfully! Reloading...</div>`;
      setTimeout(() => { closeModal(); loadDashboard(); }, 1500);
    } else {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      document.getElementById('modalStatus').innerHTML = `<div class="error-text">Error: ${err.message || 'Unknown error'}</div>`;
    }
  } catch (e) {
    document.getElementById('modalStatus').innerHTML = `<div class="error-text">Error: ${e.message}</div>`;
  }
  document.getElementById('modalConfirmBtn').disabled = false;
  document.getElementById('modalConfirmBtn').textContent = 'Run Workflow';
}

function quickTrigger(name, inputs) {
  const token = getToken();
  if (!token) {
    document.getElementById('patStatus').textContent = 'Enter PAT first!';
    document.getElementById('patStatus').style.color = 'var(--error)';
    return;
  }
  const wf = allWorkflows.find(w => w.name === name);
  if (!wf) {
    document.getElementById('patStatus').textContent = 'Workflow not found: ' + name;
    document.getElementById('patStatus').style.color = 'var(--error)';
    return;
  }
  fetch(`${BASE}/actions/workflows/${wf.id}/dispatches`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ ref: 'main', inputs })
  }).then(r => {
    const msg = r.status === 204 ? '\u2705 Triggered: ' + name : '\u274C Failed: ' + name;
    document.getElementById('patStatus').textContent = msg;
    document.getElementById('patStatus').style.color = r.status === 204 ? 'var(--success)' : 'var(--error)';
    if (r.status === 204) setTimeout(loadDashboard, 3000);
  });
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

loadDashboard();
setInterval(loadDashboard, 30000);
</script>
</body>
</html>
